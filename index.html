<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Holiday Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0f1117;
  --surface:#181b23;
  --surface2:#1f2330;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.14);
  --text:#eeeef0;
  --muted:#7a7d8a;
  --muted2:#555869;
  --radius:10px;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:2rem 1.25rem 3rem;
}

.container{max-width:960px;margin:0 auto}

header{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:1rem;
  margin-bottom:2rem;
  padding-bottom:1rem;
  border-bottom:0.5px solid var(--border2);
  flex-wrap:wrap;
}

.site-title{
  font-family:'DM Mono',monospace;
  font-size:13px;
  font-weight:500;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--muted);
}

.site-title span{
  display:inline-block;
  width:7px;height:7px;
  border-radius:50%;
  background:#5b8def;
  margin-right:.6rem;
  vertical-align:middle;
}

.updated{
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted2);
  letter-spacing:.04em;
}

.toolbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:1.5rem;
}

.nav-group{display:flex;align-items:center;gap:8px}

.nav-btn{
  background:transparent;
  border:0.5px solid var(--border2);
  color:var(--muted);
  border-radius:var(--radius);
  padding:6px 14px;
  cursor:pointer;
  font-size:15px;
  line-height:1;
  transition:border-color .12s,color .12s;
}
.nav-btn:hover{border-color:#5b8def;color:#5b8def}

.month-label{
  font-size:20px;
  font-weight:500;
  min-width:200px;
  text-align:center;
  letter-spacing:.01em;
}

.today-btn{
  background:transparent;
  border:0.5px solid var(--border2);
  color:var(--muted);
  border-radius:var(--radius);
  padding:6px 14px;
  cursor:pointer;
  font-family:'DM Mono',monospace;
  font-size:11px;
  letter-spacing:.06em;
  text-transform:uppercase;
  transition:border-color .12s,color .12s;
}
.today-btn:hover{border-color:#5b8def;color:#5b8def}

.filters{display:flex;gap:6px;flex-wrap:wrap}

.filter-btn{
  display:flex;
  align-items:center;
  gap:6px;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  border:1.5px solid transparent;
  transition:opacity .15s,border-color .15s;
  white-space:nowrap;
  background:transparent;
}
.filter-btn.off{opacity:.28}

.dot-sw{
  width:8px;height:8px;
  border-radius:50%;
  flex-shrink:0;
}

.weekday-row{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  margin-bottom:5px;
}
.wd{
  font-family:'DM Mono',monospace;
  font-size:10px;
  text-align:center;
  color:var(--muted2);
  padding:3px 0;
  letter-spacing:.05em;
}

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.day-cell{
  border:0.5px solid var(--border);
  border-radius:var(--radius);
  padding:7px 6px 6px;
  min-height:80px;
  background:var(--surface);
  position:relative;
  transition:border-color .1s;
}
.day-cell:hover{border-color:var(--border2)}
.day-cell.empty{border-color:transparent;background:transparent;pointer-events:none}
.day-cell.is-today{border-color:rgba(91,141,239,.45)}

.day-num{
  font-family:'DM Mono',monospace;
  font-size:11px;
  font-weight:500;
  margin-bottom:5px;
  width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  line-height:1;
}
.day-num.is-today-num{
  background:#5b8def;
  color:#fff;
}
.day-num.wknd-num{color:var(--muted2)}

.bars{display:flex;flex-direction:column;gap:3px}

.mbar{
  height:5px;
  border-radius:3px;
  width:100%;
  transition:opacity .12s;
}

.tooltip{
  display:none;
  position:absolute;
  z-index:20;
  bottom:calc(100% + 6px);
  left:50%;
  transform:translateX(-50%);
  background:var(--surface2);
  border:0.5px solid var(--border2);
  border-radius:var(--radius);
  padding:10px 12px;
  font-size:11px;
  line-height:1.7;
  white-space:nowrap;
  min-width:200px;
}

.day-cell:hover .tooltip{display:block}

.tip-title{
  font-weight:500;
  font-size:12px;
  margin-bottom:6px;
  color:var(--text);
  border-bottom:0.5px solid var(--border2);
  padding-bottom:5px;
}

.tip-row{
  display:flex;
  align-items:center;
  gap:6px;
}
.tip-dot{
  width:7px;height:7px;
  border-radius:50%;
  flex-shrink:0;
}
.tip-name{color:var(--muted);flex:1}
.tip-status{font-weight:500;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.04em}

.legend-row{
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
  margin-top:1.25rem;
  padding-top:1rem;
  border-top:0.5px solid var(--border);
}

.leg-section{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.leg-label{
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted2);
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-right:4px;
}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.leg-bar{width:18px;height:5px;border-radius:3px;flex-shrink:0}
.leg-sep{width:0.5px;height:14px;background:var(--border2)}

.month-stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-bottom:1.5rem;
}
.stat-card{
  background:var(--surface2);
  border-radius:var(--radius);
  padding:.8rem 1rem;
}
.stat-num{
  font-family:'DM Mono',monospace;
  font-size:22px;
  font-weight:400;
  line-height:1;
  margin-bottom:4px;
}
.stat-label{
  font-size:10px;
  letter-spacing:.07em;
  text-transform:uppercase;
  color:var(--muted);
}

footer{
  margin-top:2rem;
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted2);
  letter-spacing:.03em;
}
</style>
</head>
<body>
<div class="container">

<header>
  <div class="site-title"><span></span>Market Holiday Calendar</div>
  <div class="updated">Data: 2025–2026 · Static holiday dataset</div>
</header>

<div class="toolbar">
  <div class="nav-group">
    <button class="nav-btn" id="prevBtn">&#8592;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" id="nextBtn">&#8594;</button>
    <button class="today-btn" id="todayBtn">Today</button>
  </div>
  <div class="filters" id="filters"></div>
</div>

<div class="month-stats" id="statsRow"></div>

<div class="weekday-row">
  <div class="wd">Sun</div><div class="wd">Mon</div><div class="wd">Tue</div>
  <div class="wd">Wed</div><div class="wd">Thu</div><div class="wd">Fri</div><div class="wd">Sat</div>
</div>

<div class="cal-grid" id="calGrid"></div>

<div class="legend-row">
  <div class="leg-section" id="mktLegend"></div>
  <div class="leg-sep"></div>
  <div class="leg-section">
    <span class="leg-label">Status</span>
    <div class="leg-item"><div class="leg-bar" style="background:#639922;opacity:.8"></div>Trading</div>
    <div class="leg-item"><div class="leg-bar" style="background:#E24B4A;opacity:.75"></div>Holiday</div>
    <div class="leg-item"><div class="leg-bar" style="background:#888780;opacity:.4"></div>Weekend</div>
  </div>
</div>

<footer>
  Hover any date for details &nbsp;·&nbsp; Click market tags to filter &nbsp;·&nbsp;
  To add markets or update holidays, edit the MARKETS array in this file.
</footer>

</div>

<script>
const MARKETS = [
  {
    id: 'cn',
    label: 'China futures',
    sub: 'SHFE · DCE · CZCE · INE · GFEX · CFFEX',
    color: '#378ADD',
    weekends: [0, 6],
    holidays: new Set([
      '2025-01-01',
      '2025-01-28','2025-01-29','2025-01-30','2025-01-31','2025-02-03','2025-02-04',
      '2025-04-04','2025-04-05',
      '2025-05-01','2025-05-02','2025-05-05',
      '2025-05-31','2025-06-02',
      '2025-10-01','2025-10-02','2025-10-03','2025-10-06','2025-10-07','2025-10-08',
      '2026-01-01',
      '2026-01-26','2026-01-27','2026-01-28','2026-01-29','2026-01-30','2026-02-02',
      '2026-04-06',
      '2026-05-01','2026-05-04','2026-05-05',
      '2026-06-19',
      '2026-10-01','2026-10-02','2026-10-05','2026-10-06','2026-10-07','2026-10-08'
    ])
  },
  {
    id: 'hk',
    label: 'Hong Kong',
    sub: 'HKEX',
    color: '#D85A30',
    weekends: [0, 6],
    holidays: new Set([
      '2025-01-01',
      '2025-01-29','2025-01-30','2025-01-31',
      '2025-04-04','2025-04-18','2025-04-19','2025-04-21',
      '2025-05-01','2025-05-31',
      '2025-07-01',
      '2025-10-01','2025-10-07',
      '2025-12-25','2025-12-26',
      '2026-01-01',
      '2026-01-27','2026-01-28','2026-01-29',
      '2026-04-03','2026-04-06',
      '2026-05-01','2026-05-25',
      '2026-07-01',
      '2026-10-01','2026-12-25'
    ])
  },
  {
    id: 'sg',
    label: 'Singapore',
    sub: 'SGX',
    color: '#1D9E75',
    weekends: [0, 6],
    holidays: new Set([
      '2025-01-01',
      '2025-01-29',
      '2025-04-18',
      '2025-05-01','2025-05-12',
      '2025-08-09',
      '2025-10-20',
      '2025-12-25',
      '2026-01-01',
      '2026-01-19',
      '2026-04-03',
      '2026-05-01','2026-05-27',
      '2026-08-10',
      '2026-11-09',
      '2026-12-25'
    ])
  },
  {
    id: 'uk',
    label: 'UK',
    sub: 'LSE · ICE Europe',
    color: '#9F77DD',
    weekends: [0, 6],
    holidays: new Set([
      '2025-01-01',
      '2025-04-18','2025-04-21',
      '2025-05-05','2025-05-26',
      '2025-08-25',
      '2025-12-25','2025-12-26',
      '2026-01-01',
      '2026-04-03','2026-04-06',
      '2026-05-04','2026-05-25',
      '2026-08-31',
      '2026-12-25','2026-12-28'
    ])
  }
];

const MONTH_NAMES = ['January','February','March','April','May','June',
  'July','August','September','October','November','December'];

function pad(n){ return String(n).padStart(2,'0'); }
function dkey(y,m,d){ return `${y}-${pad(m)}-${pad(d)}`; }

const now = new Date();
let viewYear = now.getFullYear();
let viewMonth = now.getMonth() + 1;
let active = new Set(MARKETS.map(m => m.id));

function getStatus(mkt, y, m, d){
  const dow = new Date(y, m-1, d).getDay();
  if(mkt.weekends.includes(dow)) return 'weekend';
  if(mkt.holidays.has(dkey(y,m,d))) return 'holiday';
  return 'open';
}

function barColor(status){
  if(status === 'open') return { bg:'#639922', opacity:'0.82' };
  if(status === 'holiday') return { bg:'#E24B4A', opacity:'0.78' };
  return { bg:'#888780', opacity:'0.38' };
}

function tipStatusColor(status){
  if(status === 'open') return '#5caa38';
  if(status === 'holiday') return '#ff6b6b';
  return '#888780';
}

function tipStatusLabel(status){
  if(status === 'open') return 'Trading';
  if(status === 'holiday') return 'Holiday';
  return 'Weekend';
}

function buildFilters(){
  const el = document.getElementById('filters');
  el.innerHTML = '';
  MARKETS.forEach(m => {
    const on = active.has(m.id);
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (on ? '' : ' off');
    btn.style.borderColor = on ? m.color : 'transparent';
    btn.style.color = m.color;
    btn.innerHTML = `<span class="dot-sw" style="background:${m.color}"></span>${m.label}`;
    btn.onclick = () => {
      if(active.has(m.id)){
        if(active.size > 1) active.delete(m.id);
      } else {
        active.add(m.id);
      }
      buildFilters();
      renderCal();
    };
    el.appendChild(btn);
  });
}

function renderStats(y, m){
  const days = new Date(y, m, 0).getDate();
  const visible = MARKETS.filter(mk => active.has(mk.id));
  let allOpen = 0, anyHoliday = 0, weekends = 0;
  for(let d = 1; d <= days; d++){
    const dow = new Date(y, m-1, d).getDay();
    if([0,6].includes(dow)){ weekends++; continue; }
    const statuses = visible.map(mk => getStatus(mk, y, m, d));
    if(statuses.every(s => s === 'open')) allOpen++;
    if(statuses.some(s => s === 'holiday')) anyHoliday++;
  }
  const el = document.getElementById('statsRow');
  el.innerHTML = `
    <div class="stat-card">
      <div class="stat-num" style="color:#5caa38">${allOpen}</div>
      <div class="stat-label">All markets open</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:#ff6b6b">${anyHoliday}</div>
      <div class="stat-label">At least one closed</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:#888780">${weekends}</div>
      <div class="stat-label">Weekend days</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--muted)">${days}</div>
      <div class="stat-label">Total days</div>
    </div>`;
}

function buildLegend(){
  const el = document.getElementById('mktLegend');
  el.innerHTML = `<span class="leg-label">Markets</span>`;
  MARKETS.filter(m => active.has(m.id)).forEach(m => {
    el.innerHTML += `<div class="leg-item"><div class="leg-bar" style="background:${m.color};opacity:.85"></div>${m.label} <span style="color:var(--muted2);font-size:10px">${m.sub}</span></div>`;
  });
}

function renderCal(){
  document.getElementById('monthLabel').textContent =
    `${MONTH_NAMES[viewMonth-1]} ${viewYear}`;

  const days = new Date(viewYear, viewMonth, 0).getDate();
  const firstDow = new Date(viewYear, viewMonth-1, 1).getDay();
  const todayKey = dkey(now.getFullYear(), now.getMonth()+1, now.getDate());
  const visible = MARKETS.filter(m => active.has(m.id));

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  for(let i = 0; i < firstDow; i++){
    const e = document.createElement('div');
    e.className = 'day-cell empty';
    grid.appendChild(e);
  }

  for(let d = 1; d <= days; d++){
    const k = dkey(viewYear, viewMonth, d);
    const isToday = k === todayKey;
    const dow = new Date(viewYear, viewMonth-1, d).getDay();
    const isWknd = [0,6].includes(dow);

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isToday ? ' is-today' : '');

    let numClass = 'day-num';
    if(isToday) numClass += ' is-today-num';
    else if(isWknd) numClass += ' wknd-num';

    let barsHtml = '';
    let tipRows = '';

    visible.forEach(m => {
      const st = getStatus(m, viewYear, viewMonth, d);
      const c = barColor(st);
      barsHtml += `<div class="mbar" style="background:${c.bg};opacity:${c.opacity}"></div>`;
      tipRows += `<div class="tip-row">
        <div class="tip-dot" style="background:${m.color}"></div>
        <span class="tip-name">${m.label}</span>
        <span class="tip-status" style="color:${tipStatusColor(st)}">${tipStatusLabel(st)}</span>
      </div>`;
    });

    const dateDisplay = `${MONTH_NAMES[viewMonth-1].slice(0,3)} ${d}, ${viewYear}`;
    cell.innerHTML = `
      <div class="${numClass}">${d}</div>
      <div class="bars">${barsHtml}</div>
      <div class="tooltip">
        <div class="tip-title">${dateDisplay}</div>
        ${tipRows}
      </div>`;

    grid.appendChild(cell);
  }

  renderStats(viewYear, viewMonth);
  buildLegend();
}

document.getElementById('prevBtn').onclick = () => {
  viewMonth--;
  if(viewMonth < 1){ viewMonth = 12; viewYear--; }
  renderCal();
};
document.getElementById('nextBtn').onclick = () => {
  viewMonth++;
  if(viewMonth > 12){ viewMonth = 1; viewYear++; }
  renderCal();
};
document.getElementById('todayBtn').onclick = () => {
  viewYear = now.getFullYear();
  viewMonth = now.getMonth() + 1;
  renderCal();
};

buildFilters();
renderCal();
</script>
</body>
</html>
